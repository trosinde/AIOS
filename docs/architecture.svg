    <line x1="1178" y1="782" x2="1202" y2="782" stroke="#fff" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="1210" y="786" class="legend-text" fill="#fff">Planned / optional</text>

    <rect x="1178" y="794" width="24" height="4" rx="1" fill="#b83c22"/>
    <rect x="1190" y="794" width="12" height="4" rx="1" fill="#0e6b52"/>
    <text x="1210" y="800" class="legend-text" fill="#fff" opacity="0.6">Color = layer ownership</text>
