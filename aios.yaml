# AIOS Konfiguration
# Kopiere nach ~/.aios/config.yaml oder nutze als ./aios.yaml im Projektverzeichnis

providers:
  claude:
    type: anthropic
    model: claude-sonnet-4-20250514
  ollama-72b:
    type: ollama
    model: qwen2.5:72b
    endpoint: http://172.24.32.82:11435
    apiKey: b22eddd826254bce103585863b7140ec1c080b0b9444fc5e691856557b52475f
  ollama-nemo:
    type: ollama
    model: mistral-nemo:12b
    endpoint: http://172.24.32.82:11435
    apiKey: b22eddd826254bce103585863b7140ec1c080b0b9444fc5e691856557b52475f
  ollama-coder:
    type: ollama
    model: qwen2.5-coder:7b
    endpoint: http://172.24.32.82:11435
    apiKey: b22eddd826254bce103585863b7140ec1c080b0b9444fc5e691856557b52475f

defaults:
  provider: claude

paths:
  patterns: ./patterns
  personas: ./personas

mcp:
  servers:
    azure-devops:
      command: node
      args: ["/mnt/c/Users/rosin-1/repos/mcp-azure_devops/ts/dist/index.js"]
      category: devops
      prefix: azdo
      description: "Azure DevOps – Work Items, Git, Tests, Sprints"
      env:
        AZDO_CONFIG: "./azdo-config.json"
    pdftools:
      command: node
      args: ["/mnt/c/Users/rosin-1/repos/mcp_pdftools/mcp-server/dist/index.js"]
      category: pdf
      prefix: pdf
      description: "PDFTools – PDF operations (merge, split, extract, convert)"
      exclude: [pdf_ocr]
      env:
        MCP_PDFTOOLS_VENV: "/mnt/c/Users/rosin-1/repos/mcp_pdftools/venv/bin/python"

rag:
  defaultProvider: local
  defaultModel: Xenova/all-MiniLM-L6-v2
  ollama:
    model: all-minilm
    endpoint: http://172.24.32.82:11435
    apiKey: b22eddd826254bce103585863b7140ec1c080b0b9444fc5e691856557b52475f
  collections:
    dvoi-workitems:
      preprocessing:
        maxChunkLength: 500
        chunkStrategy: truncate
        cleaners: [stripHtml, normalizeWhitespace]
        fields: [title, description, acceptanceCriteria, tags]
      search:
        minRelevance: 0.3
        topK: 20
        queryExpansion:
          DD: [Density Determination]
          MID: [Measuring Instrument Directive]
    approval-docs:
      preprocessing:
        maxChunkLength: 1000
        chunkStrategy: sliding_window
        chunkOverlap: 200
        cleaners: [normalizeWhitespace]
      search:
        minRelevance: 0.35
        topK: 15
    code-symbols:
      preprocessing:
        maxChunkLength: 300
        chunkStrategy: truncate
        cleaners: [normalizeWhitespace]
      search:
        minRelevance: 0.45
        topK: 10
