name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to run CI on"
        required: false
        default: "development"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  promote-to-main:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head development --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping."
          else
            gh pr create \
              --base main \
              --head development \
              --title "Promote development → main" \
              --body "All CI checks passed on development. Ready for review and merge to main."
          fi
