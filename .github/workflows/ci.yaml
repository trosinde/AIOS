name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to run CI on"
        required: false
        default: "development"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract the summary line from json-summary
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| **Statements** | ' + fmt(s.statements) + ' |');
              console.log('| **Branches** | ' + fmt(s.branches) + ' |');
              console.log('| **Functions** | ' + fmt(s.functions) + ' |');
              console.log('| **Lines** | ' + fmt(s.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY

            # Security module detail
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Security Modules" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const secFiles = Object.keys(c)
                .filter(k => k.includes('src/security/') && !k.includes('.test.') && k !== 'total')
                .sort();
              if (secFiles.length > 0) {
                console.log('| Module | Stmts | Branch | Fn | Lines |');
                console.log('|--------|-------|--------|-----|-------|');
                for (const f of secFiles) {
                  const d = c[f];
                  const name = f.replace(/.*src\/security\//, '');
                  console.log('| ' + name + ' | ' + d.statements.pct + '% | ' + d.branches.pct + '% | ' + d.functions.pct + '% | ' + d.lines.pct + '% |');
                }
              }
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Test (e2e — real CLI subprocess, stub embeddings)
        env:
          AIOS_EMBEDDING_PROVIDER: stub
        run: npm run test:e2e

      - name: Bench (KnowledgeBus, stub embeddings)
        env:
          AIOS_EMBEDDING_PROVIDER: stub
        run: npm run bench

  promote-to-main:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if development has no commits ahead of main (e.g.
          # after a hotfix went directly to main and development was
          # fast-forwarded). gh pr create would otherwise error out
          # with "No commits between main and development".
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" = "0" ]; then
            echo "development is not ahead of main (ahead=0), nothing to promote."
            exit 0
          fi
          EXISTING=$(gh pr list --base main --head development --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists."
            PR_NUM="$EXISTING"
          else
            PR_NUM=$(gh pr create \
              --base main \
              --head development \
              --title "Promote development → main" \
              --body "All CI checks passed on development ($AHEAD commit(s) ahead of main)." \
              | grep -oP '#\K[0-9]+' || true)
          fi
          if [ -n "$PR_NUM" ]; then
            # Wait for required check "lint-and-test" to be visible as SUCCESS
            # on the PR before attempting admin-merge. Branch protection can
            # briefly report the check as "expected" even after the needs
            # dependency succeeded (eventual consistency on the checks API).
            for i in $(seq 1 30); do
              STATE=$(gh pr view "$PR_NUM" --json statusCheckRollup \
                --jq '[.statusCheckRollup[] | select(.name=="lint-and-test")] | .[0].conclusion // "PENDING"')
              if [ "$STATE" = "SUCCESS" ]; then
                echo "lint-and-test is SUCCESS on PR #$PR_NUM, merging."
                break
              fi
              echo "Attempt $i: lint-and-test state=$STATE, waiting 10s..."
              sleep 10
            done
            gh pr merge "$PR_NUM" --merge --admin
          fi
