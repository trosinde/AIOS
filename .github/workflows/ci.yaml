name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to run CI on"
        required: false
        default: "main"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract the summary line from json-summary
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| **Statements** | ' + fmt(s.statements) + ' |');
              console.log('| **Branches** | ' + fmt(s.branches) + ' |');
              console.log('| **Functions** | ' + fmt(s.functions) + ' |');
              console.log('| **Lines** | ' + fmt(s.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY

            # Per-module detail, grouped by src/ subdirectory
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const files = Object.keys(c)
                .filter(k => k !== 'total' && !k.includes('.test.') && !k.includes('.bench.'))
                .sort();
              const groups = new Map();
              for (const f of files) {
                const m = f.match(/src\/([^/]+)\//);
                const group = m ? m[1] : 'src';
                if (!groups.has(group)) groups.set(group, []);
                groups.get(group).push(f);
              }
              const warn = (pct) => pct < 60 ? ' ⚠️' : '';
              for (const [group, list] of [...groups.entries()].sort()) {
                console.log('');
                console.log('### src/' + group);
                console.log('');
                console.log('| Module | Stmts | Branch | Fn | Lines |');
                console.log('|--------|-------|--------|-----|-------|');
                for (const f of list) {
                  const d = c[f];
                  const name = f.replace(new RegExp('.*src/' + group + '/'), '');
                  console.log('| ' + name +
                    ' | ' + d.statements.pct + '%' + warn(d.statements.pct) +
                    ' | ' + d.branches.pct + '%' + warn(d.branches.pct) +
                    ' | ' + d.functions.pct + '%' + warn(d.functions.pct) +
                    ' | ' + d.lines.pct + '%' + warn(d.lines.pct) + ' |');
                }
              }
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Test (e2e — real CLI subprocess, stub embeddings)
        env:
          AIOS_EMBEDDING_PROVIDER: stub
        run: npm run test:e2e

      - name: Bench (KnowledgeBus, stub embeddings)
        env:
          AIOS_EMBEDDING_PROVIDER: stub
        run: npm run bench

  auto-merge-to-main:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Auto-merge PR into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Only auto-merge PRs authored by the repo owner or github-actions
          # (mirrors the pr-admin-merge rule: own/CI PRs only, never third-party).
          OWNER="${{ github.repository_owner }}"
          if [ "$PR_AUTHOR" != "$OWNER" ] && [ "$PR_AUTHOR" != "github-actions[bot]" ]; then
            echo "PR #$PR_NUM authored by $PR_AUTHOR — skipping auto-merge (not owner/CI)."
            exit 0
          fi
          MERGE_STATE=$(gh pr view "$PR_NUM" --json mergeStateStatus --jq '.mergeStateStatus')
          echo "PR #$PR_NUM mergeStateStatus: $MERGE_STATE"
          if [ "$MERGE_STATE" = "BEHIND" ]; then
            echo "PR is BEHIND main — updating branch; new CI run will retry the merge."
            gh pr update-branch "$PR_NUM"
            exit 0
          fi
          gh pr merge "$PR_NUM" --merge --admin
